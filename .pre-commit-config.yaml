# Run with: pre-commit run --all-files
# Install with: pre-commit install
#
# Hooks here are deliberately fast: the goal is "blocks a commit that
# would obviously fail CI" rather than "runs the whole test suite".
#
# Python lint / type-check hooks run as ``language: system`` so they
# pick up the ``ruff`` / ``mypy`` from the active virtualenv (``pip
# install -e '.[dev]'``), matching what CI installs.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        # Asset minifier outputs are byte-exact; whitespace fixers must
        # not rewrite them or the CSP hashes pinned in webpage/head.py
        # drift away from the served bytes.
        exclude: '^assets/(?!src/).*'
      - id: end-of-file-fixer
        exclude: '^assets/(?!src/).*'
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: '^assets/(?!src/).*'

  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint, autofix)
        entry: ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        # Type-check the whole ``investing/`` package plus the local
        # preview helper that imports from it. The build-asset script
        # is intentionally excluded -- it's a tiny self-contained
        # tool with no investing/ imports.
        files: '^(investing/.*|scripts/preview)\.py$'
        require_serial: true

  - repo: https://github.com/thibaudcolas/pre-commit-stylelint
    rev: v16.10.0
    hooks:
      - id: stylelint
        # Lint the readable CSS sources only; ``assets/page.css`` is a
        # generated artefact (minified by ``scripts/build_assets.py``).
        files: '^assets/src/css/.*\.css$'
        additional_dependencies:
          - stylelint@16.10.0
          - stylelint-config-standard@36.0.1

  - repo: local
    hooks:
      - id: build-assets
        name: build minified assets
        entry: python scripts/build_assets.py
        language: system
        # Re-run any time the readable sources change so the committed
        # minified outputs (and their CSP hashes) stay in sync.
        files: '^assets/src/'
        pass_filenames: false
      - id: tighten-logos
        name: regenerate cropped logos
        entry: python scripts/tighten_logos.py
        language: system
        # Re-run any time a source logo lands or changes so the
        # ``logos/tight/`` mirror (which is what production actually
        # serves -- see ``investing.paths.LOGOS_ADDRESS``) stays in
        # lockstep with its sources. The ``regenerate-logos`` workflow
        # is the server-side safety net for commits that bypass this
        # hook; the matching ``test.yml`` step fails CI when drift
        # makes it into a PR. Only files directly inside ``logos/``
        # trigger the hook -- changes under ``logos/tight/`` are
        # themselves the regenerated output so they would only loop.
        files: '^logos/[^/]+\.(svg|png|jpg|jpeg)$'
        pass_filenames: false
