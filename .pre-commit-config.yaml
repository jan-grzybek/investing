# Run with: pre-commit run --all-files
# Install with: pre-commit install
#
# Hooks here are deliberately fast: the goal is "blocks a commit that
# would obviously fail CI" rather than "runs the whole test suite".
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        # Type-check only the hand-maintained sources. Tests stay
        # untyped for now to keep the loop fast and the diff small.
        files: '^(update|preview)\.py$'
        additional_dependencies:
          - types-python-dateutil
          - types-requests
