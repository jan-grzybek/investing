# Run with: pre-commit run --all-files
# Install with: pre-commit install
#
# Hooks here are deliberately fast: the goal is "blocks a commit that
# would obviously fail CI" rather than "runs the whole test suite".
#
# Python lint / type-check hooks run as ``language: system`` so they
# pick up exactly the ``ruff`` / ``mypy`` versions pinned in
# ``requirements-dev.txt`` (and therefore the same versions CI runs).
# The earlier pinned-repo variant drifted: pre-commit was on ruff
# 0.6.9 / mypy 1.11.2 while CI was on ruff 0.15 / mypy 2.1, so a
# fix that pre-commit accepted could still fail CI (and vice versa).
# ``pre-commit install`` is now a prerequisite of having the dev
# requirements installed (``pip install -e '.[dev]'``).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        # Asset minifier outputs are byte-exact; whitespace fixers must
        # not rewrite them or the CSP hashes pinned in webpage/head.py
        # drift away from the served bytes.
        exclude: '^assets/(?!src/).*'
      - id: end-of-file-fixer
        exclude: '^assets/(?!src/).*'
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: '^assets/(?!src/).*'

  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint, autofix)
        entry: ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        # Type-check the whole ``investing/`` package plus the local
        # preview helper that imports from it. The build-asset script
        # is intentionally excluded -- it's a tiny self-contained
        # tool with no investing/ imports.
        files: '^(investing/.*|scripts/preview)\.py$'
        require_serial: true

  - repo: https://github.com/thibaudcolas/pre-commit-stylelint
    rev: v16.10.0
    hooks:
      - id: stylelint
        # Lint the readable CSS sources only; ``assets/page.css`` is a
        # generated artefact (minified by ``scripts/build_assets.py``).
        files: '^assets/src/css/.*\.css$'
        additional_dependencies:
          - stylelint@16.10.0
          - stylelint-config-standard@36.0.1

  - repo: local
    hooks:
      - id: build-assets
        name: build minified assets
        entry: python scripts/build_assets.py
        language: system
        # Re-run any time the readable sources change so the committed
        # minified outputs (and their CSP hashes) stay in sync.
        files: '^assets/src/'
        pass_filenames: false
