version: 2
updates:
  # Python dependencies tracked via the pip-compile generated
  # ``requirements.txt`` / ``requirements-dev.txt`` lockfiles. The
  # source of truth for direct deps now lives in ``pyproject.toml``
  # (``[project.dependencies]`` + ``[project.optional-dependencies.dev]``)
  # so the lock is a pure transitive snapshot. Dependabot's PRs against
  # the lock provide the reproducibility signal we want without
  # colliding with the human-edited pyproject.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    groups:
      python-minor:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
    # Collapse weekly action bumps into one PR rather than fanning out
    # across five separate ones; the production deploy + tests + security
    # workflows pin the same handful of actions so a synchronised bump is
    # easier to review than five interleaved ones.
    groups:
      actions-minor:
        update-types: ["minor", "patch"]
