name: Update and deploy webpage

on:
  schedule:
    - cron: "30 8,14,20 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
  Update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install system deps
        # ``cairosvg`` (used to rasterise the SVG holding logos in
        # the OG image) needs the system-level ``libcairo2`` shared
        # library; pip can't install that for us.
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Prepare credentials
        shell: bash
        env:
          GSHEET_CREDS: ${{ secrets.GSHEET_CREDS }}
        run: echo "${GSHEET_CREDS}" > /tmp/gsheet_creds.json

      - name: Generate new webpage
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
        run: python update.py 2>/dev/null

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  Deploy:
    needs: Update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
