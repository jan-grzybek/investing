name: Update and deploy webpage

on:
  schedule:
    # Hourly during the union of regular trading hours of the major
    # US (NYSE / NASDAQ) and European (LSE / Euronext / Xetra)
    # exchanges, on weekdays. GitHub Actions cron schedules are
    # always UTC with no DST awareness, so the window covers both
    # halves of the year:
    #   - LSE / Euronext / Xetra: 07:00-15:30 UTC (summer DST) or
    #     08:00-16:30 UTC (winter), Mon-Fri.
    #   - NYSE / NASDAQ: 13:30-20:00 UTC (summer) or 14:30-21:00
    #     UTC (winter), Mon-Fri.
    # Union: 07:00-21:00 UTC -> hours 7..21 inclusive (15 runs per
    # weekday). Exchange holidays still trigger a run; the page
    # generation is idempotent, so a no-op redeploy on those days
    # is harmless. Note GitHub may delay scheduled runs by up to
    # ~15 minutes during peak load, which is well below the
    # 1-hour granularity here.
    - cron: "0 7-21 * * 1-5"
    # Once daily on weekends (Sat-Sun) at 12:00 UTC, when all major
    # exchanges are closed. Keeps the deployed page from going stale
    # over the weekend (e.g. refreshing the date header and any
    # time-sensitive copy) without burning hourly CI minutes.
    - cron: "0 12 * * 6,0"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
  Update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install system deps
        # ``cairosvg`` (used to rasterise the SVG holding logos in
        # the OG image) needs the system-level ``libcairo2`` shared
        # library; pip can't install that for us.
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Prepare credentials
        shell: bash
        env:
          GSHEET_CREDS: ${{ secrets.GSHEET_CREDS }}
        run: echo "${GSHEET_CREDS}" > /tmp/gsheet_creds.json

      - name: Generate new webpage
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
        # ``update.py`` runs ``main()`` through a leak-safe wrapper
        # (``_run_main_safely``) that silences both ``sys.stderr`` and
        # the underlying file descriptor for the duration of the
        # build, so library warnings and tracebacks cannot smuggle
        # secrets (``GSHEET_ID``, the service-account credentials) or
        # nominal portfolio values (share counts, cash balances, FX
        # rates) into these public job logs. On failure the wrapper
        # restores stderr and prints a hand-formatted summary made of
        # only public identifiers (exception class plus per-frame
        # file:lineno / function / source line), so we still get
        # enough breadcrumbs to debug without a redirect that would
        # mask everything. Do NOT reintroduce ``2>/dev/null`` here --
        # it would defeat the visibility half of that contract.
        run: python update.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  Deploy:
    needs: Update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
