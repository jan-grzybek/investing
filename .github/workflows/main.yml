name: Update and deploy webpage

on:
  schedule:
    - cron: "0 9,15,21 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
  Update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Prepare credentials
        shell: bash
        env:
          GSHEET_CREDS: ${{ secrets.GSHEET_CREDS }}
        run: echo "${GSHEET_CREDS}" > /tmp/gsheet_creds.json

      - name: Generate new webpage
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
        run: |
          mkdir -p assets
          python update.py #2>/dev/null
          npx svgo -f assets

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  Deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
