name: Update and deploy webpage

on:
  schedule:
    # Refresh every two hours during the union of regular trading
    # hours of the major US (NYSE / NASDAQ) and European (LSE /
    # Euronext / Xetra) exchanges, on weekdays. GitHub Actions cron
    # schedules are always UTC with no DST awareness, so the window
    # covers both halves of the year:
    #   - LSE / Euronext / Xetra: 07:00-15:30 UTC (summer DST) or
    #     08:00-16:30 UTC (winter), Mon-Fri.
    #   - NYSE / NASDAQ: 13:30-20:00 UTC (summer) or 14:30-21:00
    #     UTC (winter), Mon-Fri.
    # Union: 07:00-21:00 UTC -> 7,9,11,13,15,17,19,21 (8 runs per
    # weekday). The previous hourly cadence (15 runs/day) refreshed
    # the live tape faster than market participants can act on it
    # given the ~5-15 minute delay in scheduled job dispatch and
    # spent the spare compute regenerating an OG image whose
    # inputs change at most a few times per day. Exchange holidays
    # still trigger a run; the page generation is idempotent, so a
    # no-op redeploy on those days is harmless.
    - cron: "0 7-21/2 * * 1-5"
    # Once daily on weekends (Sat-Sun) at 12:00 UTC, when all major
    # exchanges are closed. Keeps the deployed page from going stale
    # over the weekend (e.g. refreshing the date header and any
    # time-sensitive copy) without burning CI minutes.
    - cron: "0 12 * * 6,0"
    # Once monthly on the 1st at 12:00 UTC: refresh committed
    # ``market_data/`` snapshots and push any diffs. Routine deploy
    # runs merge live yfinance with the archive in memory only
    # (``INVESTING_MARKET_DATA_PERSIST=0``); this cron is the sole
    # writer that lands backup updates on ``main``.
    - cron: "0 12 1 * *"
  # Run after a push to ``main`` lands, but only once the ``Tests``
  # workflow (``test.yml``) has finished successfully. Using
  # ``workflow_run`` instead of a plain ``push`` trigger means we
  # never deploy a broken commit: if pytest fails on ``main``, the
  # job-level ``if`` below short-circuits this workflow before any
  # build or Pages publish step runs. The ``branches`` filter
  # matches the head branch of the upstream run, so PR builds (which
  # ``test.yml`` also handles) don't fan out into a deploy here.
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  # ``contents: write`` lets the post-build "Commit auto-populated
  # sector overrides" step push commented-out stubs that the
  # ``append_missing_sector_stubs`` hook in
  # ``investing.sector_overrides`` adds to ``sector_overrides.toml``
  # when the build observes a missing-sector ticker. Without the
  # write scope the file would be mutated only on the ephemeral
  # runner and the maintainer's local checkout would never see the
  # auto-populated entry -- defeating the "remind the operator to
  # fill in a sector" half of the auto-populate contract.
  contents: write
  pages: write
  id-token: write
  # Lets ``investing.maintenance_notifier`` file an issue when the
  # build observes a ticker missing a sector or a logo. The
  # ``GITHUB_TOKEN`` injected into the Update job below already
  # carries the right scope as long as this permission is opted in
  # at the workflow level; the notifier dedupes against existing
  # issues (open OR closed) so it never re-files a hint the
  # maintainer has already triaged.
  issues: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
  WaitForRegenerate:
    # No-op guard job whose sole purpose is to hold the
    # ``regenerate-logos-<ref>`` concurrency lock that
    # ``regenerate-logos.yml`` also declares at the workflow level.
    # GitHub Actions serialises any pair of runs that share a
    # concurrency group across the whole repository, so when a push to
    # ``main`` has fanned out into a parallel ``regenerate-logos``
    # run (cropping the source SVGs and committing a refreshed
    # ``logos/tight/`` mirror) this job sits in the queue until that
    # workflow releases the lock. The downstream ``Update`` job then
    # checks out a settled tree where the auto-commit (if any) has
    # already landed, instead of racing the regenerate workflow's
    # push and deploying a stale crop. The single ``:`` step is a
    # POSIX no-op -- the work is the queueing, not the command --
    # which keeps the lock held for the minimum runner time.
    runs-on: ubuntu-latest
    concurrency:
      group: regenerate-logos-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Synchronise on regenerate-logos
        run: ':'

  Update:
    # Gate the build + deploy on the regenerate-logos guard so the
    # checkout below sees any ``logos/tight/`` auto-commit that the
    # parallel workflow pushed while we were queued. ``needs``
    # already serialises after ``WaitForRegenerate`` succeeds (the
    # ``:`` step is hard-pressed to fail), so the existing if
    # filter on ``workflow_run`` conclusion remains the single
    # source of truth for the deploy-eligibility gate.
    needs: WaitForRegenerate
    runs-on: ubuntu-latest
    # ``workflow_run`` fires for every terminal conclusion (success,
    # failure, cancelled, timed_out, ...), so we must filter here.
    # For the schedule and manual dispatch triggers ``github.event``
    # has no ``workflow_run`` payload, hence the event-name guard:
    # those entry points are allowed through unconditionally.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install system deps
        # ``cairosvg`` (used to rasterise the SVG holding logos in
        # the OG image) needs the system-level ``libcairo2`` shared
        # library; pip can't install that for us.
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate new webpage
        env:
          # Service-account JSON passed directly to ``pull_data`` via the
          # environment; ``investing.sheets._gspread_client`` reads it
          # with ``gspread.service_account_from_dict(json.loads(...))``
          # so the secret never lands on the runner's filesystem and
          # there's no ``/tmp/gsheet_creds.json`` left behind that a
          # later debug step could ``cat`` into job logs.
          GSHEET_CREDS: ${{ secrets.GSHEET_CREDS }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          # Opt the build into the GitHub-Issues maintenance notifier
          # (see ``investing/maintenance_notifier.py``). The flag is
          # required *and* the ``GITHUB_TOKEN`` / ``GITHUB_REPOSITORY``
          # values below have to be present -- the notifier is a strict
          # no-op when any prerequisite is missing, so a fork that
          # doesn't want auto-filed issues can simply drop the env var.
          INVESTING_NOTIFY_GITHUB: "1"
          # ``GITHUB_TOKEN`` is workflow-scoped (the ``issues: write``
          # permission opt-in at the top of this file is what gives it
          # the right scope); ``GITHUB_REPOSITORY`` and
          # ``GITHUB_API_URL`` are populated automatically by the
          # Actions runtime but have to be threaded into the step's env
          # explicitly so the Python process sees them.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
          # Routine deploys read committed snapshots and merge live
          # yfinance in memory; only the monthly cron (``0 12 1 * *``)
          # persists refreshed archives back to ``market_data/``.
          INVESTING_MARKET_DATA_PERSIST: ${{ github.event_name == 'schedule' && github.event.schedule == '0 12 1 * *' && '1' || '0' }}
        # ``python -m investing`` resolves to ``investing/__main__.py``
        # which invokes the leak-safe wrapper (``_run_main_safely``).
        # That wrapper silences both ``sys.stderr`` and the underlying
        # file descriptor for the duration of the build, so library
        # warnings and tracebacks cannot smuggle secrets (``GSHEET_ID``,
        # the service-account credentials) or nominal portfolio values
        # (share counts, cash balances, FX rates) into these public job
        # logs. On failure the wrapper restores stderr and prints a
        # hand-formatted summary made of only public identifiers
        # (exception class plus per-frame file:lineno / function /
        # source line), so we still get enough breadcrumbs to debug
        # without a redirect that would mask everything. Do NOT
        # reintroduce ``2>/dev/null`` here -- it would defeat the
        # visibility half of that contract.
        run: python -m investing

      - name: Commit auto-populated sector overrides
        # ``investing.sector_overrides.append_missing_sector_stubs``
        # is called from ``cli.build_page`` and appends a commented-
        # out template entry to ``sector_overrides.toml`` for each
        # missing-sector ticker the run observed. Without this step
        # the file would only be mutated on the ephemeral runner --
        # the maintainer's local checkout would never see the new
        # stub, and the next build (fresh checkout) would re-detect
        # the same ticker and re-append the same stub. Pushing the
        # change back to ``main`` makes the auto-populate effective:
        # the maintainer pulls, the diff is the stub they need to
        # uncomment + fill in, and the dedupe predicate in the
        # hook keeps subsequent builds idempotent.
        #
        # Following the same model as ``regenerate-logos.yml``: the
        # push uses the default ``GITHUB_TOKEN`` which (by GitHub's
        # own rules) does NOT re-trigger any workflow run, so this
        # commit will not fan out into another Tests + main.yml
        # cycle. The ``[skip ci]`` marker in the commit message is
        # belt-and-braces against a future tightening of that rule.
        #
        # The ``git status --porcelain`` guard short-circuits the
        # commit + push on every build that didn't actually mutate
        # the file -- the steady state once every observed ticker
        # has a stub (or an active override). The guard is keyed on
        # ``sector_overrides.toml`` specifically so an unrelated
        # transient file the build might leave behind doesn't
        # accidentally land in the commit.
        run: |
          if [[ -z "$(git status --porcelain sector_overrides.toml)" ]]; then
            echo "sector_overrides.toml unchanged; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add sector_overrides.toml
          git commit -m "chore(sectors): auto-populate missing sector stubs [skip ci]"
          git push

      - name: Commit market-data snapshot updates
        # Monthly backup only — see the ``0 12 1 * *`` schedule comment
        # at the top of this file and ``INVESTING_MARKET_DATA_PERSIST``
        # on the build step above.
        if: github.event_name == 'schedule' && github.event.schedule == '0 12 1 * *'
        run: |
          if [[ -z "$(git status --porcelain market_data/)" ]]; then
            echo "market_data/ unchanged; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add market_data/
          git commit -m "chore(market-data): refresh yfinance snapshots [skip ci]"
          git push

      - name: Stage public site artifact
        # Upload only the rendered page and its static dependencies —
        # not the Python source tree, tests, or committed snapshots.
        run: python scripts/stage_site.py --out site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

  Deploy:
    needs: Update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
