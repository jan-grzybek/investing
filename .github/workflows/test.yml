name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Restrict the default ``GITHUB_TOKEN`` to the least the job needs:
# pytest only checks out the tree and installs deps from PyPI, so
# read-only access to the repo contents is enough. Without this block
# the token inherits whatever the repo/org default is (often
# read-write), which CodeQL's ``actions/missing-workflow-permissions``
# query flags. Sibling ``main.yml`` declares its own permissions block
# explicitly for the same reason.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install deps
        run: pip install -e '.[dev]'

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format)
        run: ruff format --check .

      - name: Mypy
        run: mypy investing scripts/preview.py

  pytest:
    runs-on: ubuntu-latest
    strategy:
      # Don't short-circuit one Python version's failure into the others;
      # we want to see every supported runtime's report on the same PR.
      fail-fast: false
      matrix:
        # The production workflow pins itself to 3.13 (matches the
        # GitHub-hosted runner default at the time of writing); the
        # extra rows here keep us honest that the codebase still works
        # on the version pinned in ``pyproject.toml`` (3.12) and on
        # the next stable release Cursor will deploy.
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system deps
        # ``cairosvg`` (runtime dep in ``pyproject.toml``) needs the
        # system-level ``libcairo2`` shared library; pip can't
        # install that for us.
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2

      - name: Install deps
        run: pip install -e '.[dev]'

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Verify generated assets match readable sources
        # Pre-commit runs ``scripts/build_assets.py`` whenever
        # ``assets/src/`` changes, but contributors who skip the
        # hook can still ship drift. This step fails CI when
        # ``assets/<name>.js`` / ``assets/page.css`` are not byte-
        # identical to the freshly-built versions, which would
        # silently break the CSP hashes in
        # ``investing/webpage/head.py``.
        run: python scripts/build_assets.py --check

      - name: Verify cropped logos match source originals
        # Same contract as the asset-minify check above, but for the
        # logo crop mirror: ``scripts/tighten_logos.py`` rebuilds
        # ``logos/tight/`` from ``logos/``, and CI fails when the
        # committed crops don't match a fresh regeneration. The
        # production pre-commit hook (``tighten-logos``) keeps this
        # in sync locally, so this step is the PR gate that prevents
        # a half-updated mirror from merging in the first place.
        #
        # Deliberately scoped to ``pull_request`` only: a push to
        # ``main`` that introduces drift (e.g. a new source logo
        # committed without rerunning the cropper) is recovered
        # server-side by ``regenerate-logos.yml``, which rebuilds
        # ``logos/tight/`` and commits the mirror back. Failing this
        # step on push would block ``main.yml`` -- whose deploy is
        # gated on ``Tests`` success via ``workflow_run`` -- from
        # ever publishing the new logo, because the auto-commit from
        # ``regenerate-logos.yml`` uses the default ``GITHUB_TOKEN``
        # which by design does not retrigger workflows. The
        # ``WaitForRegenerate`` guard in ``main.yml`` already
        # serialises the deploy behind the regenerate workflow's
        # commit, so by the time we ship the page the mirror is
        # back in sync.
        if: github.event_name == 'pull_request'
        run: python scripts/tighten_logos.py --check

      - name: Run pytest with coverage
        # ``--cov`` enables the coverage plugin from ``pytest-cov``;
        # the config in ``pyproject.toml`` selects the ``investing``
        # package as the source set, turns on branch coverage, and
        # enforces the ``fail_under`` floor declared in
        # ``[tool.coverage.report]`` so a coverage drop fails the
        # build. Strict html5lib parsing of the synthetic preview lives
        # in ``tests/test_preview_html.py`` alongside the rest of the
        # suite.
        run: python -m pytest -v --cov=investing --cov-report=term-missing
