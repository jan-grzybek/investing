name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Restrict the default ``GITHUB_TOKEN`` to the least the job needs:
# pytest only checks out the tree and installs deps from PyPI, so
# read-only access to the repo contents is enough. Without this block
# the token inherits whatever the repo/org default is (often
# read-write), which CodeQL's ``actions/missing-workflow-permissions``
# query flags. Sibling ``main.yml`` declares its own permissions block
# explicitly for the same reason.
permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      # Don't short-circuit one Python version's failure into the others;
      # we want to see every supported runtime's report on the same PR.
      fail-fast: false
      matrix:
        # The production workflow pins itself to 3.13 (matches the
        # GitHub-hosted runner default at the time of writing); the
        # extra rows here keep us honest that the codebase still works
        # on the version pinned in ``pyproject.toml`` (3.12) and on
        # the next stable release Cursor will deploy.
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system deps
        # ``cairosvg`` (pulled in via ``requirements.txt``) needs the
        # system-level ``libcairo2`` shared library; pip can't
        # install that for us.
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Verify generated assets match readable sources
        # Pre-commit runs ``scripts/build_assets.py`` whenever
        # ``assets/src/`` changes, but contributors who skip the
        # hook can still ship drift. This step fails CI when
        # ``assets/<name>.js`` / ``assets/page.css`` are not byte-
        # identical to the freshly-built versions, which would
        # silently break the CSP hashes in
        # ``investing/webpage/head.py``.
        run: python scripts/build_assets.py --check

      - name: Run pytest with coverage
        # ``--cov`` enables the coverage plugin from ``pytest-cov``;
        # the config in ``pyproject.toml`` selects ``update`` /
        # ``preview`` / the ``investing`` package as the source set,
        # turns on branch coverage, and enforces the
        # ``fail_under`` floor declared in ``[tool.coverage.report]``
        # so a coverage drop fails the build.
        run: python -m pytest -v --cov=investing --cov=update --cov=preview --cov-report=term-missing --cov-report=xml

      - name: HTML smoke parse
        # Render the page from synthetic fixtures and parse the result
        # with the strict html5lib parser. The previous
        # ``html.parser`` from the stdlib is famously lenient and
        # would silently accept unclosed tags, missing quotes, etc.;
        # html5lib follows the WHATWG spec, so a template branch that
        # emits broken markup fails the build here instead of in the
        # browser.
        run: |
          python preview.py --out ci-smoke
          python -c "
          import html5lib
          import sys
          html = open('ci-smoke/index.html', encoding='utf-8').read()
          parser = html5lib.HTMLParser(strict=True)
          try:
              parser.parse(html)
          except html5lib.html5parser.ParseError as exc:
              print(f'html5lib rejected the rendered page: {exc}')
              sys.exit(1)
          if '<!DOCTYPE html>' not in html:
              print('missing doctype'); sys.exit(1)
          if '</html>' not in html:
              print('missing closing tag'); sys.exit(1)
          print(f'OK -- {len(html)} bytes parsed')
          "

      - name: Upload coverage report
        # Only one matrix row needs to upload (avoid 3x duplicate
        # artefacts); pick the version production runs on. ``if`` runs
        # even when prior steps fail so a partial report is still
        # available for inspection.
        if: matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
